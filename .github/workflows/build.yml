name: Build V Cash APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v3
      - name: Build APK
        run: |
          git config --global --add safe.directory "*" || true
          sed -i "s/cont = input(.*/cont = 'y'/" /home/user/.venv/lib/python3.12/site-packages/buildozer/__init__.py || true
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vcash-apk
          path: bin/*.apk
