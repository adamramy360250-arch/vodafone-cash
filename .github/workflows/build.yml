name: Build V Cash APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v3
      - name: Build APK
        run: |
          git config --global --add safe.directory "*" || true
          find /home/user/.venv/lib -name "__init__.py" -path "*/buildozer/*" -exec sed -i "s/cont = input(.*/cont = chr(121)/" {} \; || true
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vcash-apk
          path: bin/*.apk
